<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .joke-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            line-height: 1.6;
            word-wrap: break-word;
            transition: transform 0.3s ease;
        }

        .joke-box:hover {
            transform: translateY(-5px);
        }

        .joke-text {
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .copy-btn {
            background: #4CAF50;
        }

        .copy-btn:hover {
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }

        .loading {
            display: none;
            color: #667eea;
            font-weight: bold;
            margin-top: 20px;
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.9em;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .success-message.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.8em;
            }

            .joke-box {
                font-size: 1.1em;
                padding: 20px;
                min-height: 100px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh!</p>

        <div class="joke-box" id="jokeBox">
            <p class="joke-text">Click "Get Joke" to start laughing! 🎭</p>
        </div>

        <div class="button-group">
            <button onclick="getJoke()">Get Joke</button>
            <button class="copy-btn" onclick="copyToClipboard()">Copy</button>
        </div>

        <div class="success-message" id="successMessage">Copied to clipboard! ✓</div>
        <div class="loading" id="loading">Loading joke...</div>
        <div class="error" id="error"></div>
    </div>

    <script>
        let currentJoke = 'Click "Get Joke" to start laughing! 🎭';

        async function getJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');

            // Clear previous error
            error.style.display = 'none';
            error.textContent = '';

            // Show loading state
            loading.style.display = 'block';
            jokeBox.style.opacity = '0.5';

            try {
                // Using JokeAPI (https://jokeapi.dev/)
                const response = await fetch('https://v2.jokeapi.dev/joke/Any');

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Handle different joke formats
                if (data.type === 'single') {
                    currentJoke = data.joke;
                } else if (data.type === 'twopart') {
                    currentJoke = `${data.setup}\n\n${data.delivery}`;
                } else {
                    currentJoke = 'Something went wrong. Try again!';
                }

                jokeBox.innerHTML = `<p class="joke-text">${currentJoke}</p>`;
                jokeBox.style.opacity = '1';

            } catch (err) {
                console.error('Error:', err);
                error.textContent = 'Oops! Failed to load a joke. Please try again.';
                error.style.display = 'block';
                jokeBox.innerHTML = '<p class="joke-text">Failed to load joke 😞</p>';
                jokeBox.style.opacity = '1';
            } finally {
                loading.style.display = 'none';
            }
        }

        function copyToClipboard() {
            // Remove HTML tags and extra whitespace for copying
            const textToCopy = currentJoke.replace(/<[^>]*>/g, '');

            navigator.clipboard.writeText(textToCopy).then(() => {
                const successMessage = document.getElementById('successMessage');
                successMessage.classList.add('show');

                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Load a joke when the page loads
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
